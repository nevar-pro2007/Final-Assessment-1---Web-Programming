<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petrol Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="container">
        <h1>Petrol Calculator</h1>

        <!-- Cost per liter input -->
        <label for="cost">Cost per Liter:</label>
        <input type="number" id="cost" value="1.72" step="0.01">

        <!-- Liters input -->
        <label for="liters">Liters Purchased:</label>
        <input type="number" id="liters" value="0" step="0.1">

        <!-- Calculate button -->
        <button id="calculateBtn">Calculate Total</button>

        <!-- Output of the calculation -->
        <p id="totalCost">Total: $0.00</p>
    </section>

    <!-- Getting the elements, calculating the total cost and the total, and displays the result -->
    <script>
            const costInput = document.getElementById("cost");
            const litersInput = document.getElementById("liters");
            const totalDisplay = document.getElementById("totalCost");
            const calculateBtn = document.getElementById("calculateBtn");

        calculateBtn.addEventListener("click", () => {
            const cost = parseFloat(costInput.value) || 0;
            const liters = parseFloat(litersInput.value) || 0;

            const total = cost * liters;
            totalDisplay.textContent = `Total: ${total.toFixed(2)}`;
        });
    </script>
</body>
</html>
